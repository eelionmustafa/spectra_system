    <rect x="72" y="930" width="188" height="46" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="90" y="944" width="18" height="18" rx="5" fill="#DBEAFE"/>
    <text x="120" y="958" class="small">Access path</text>

    <rect x="284" y="930" width="220" height="46" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
