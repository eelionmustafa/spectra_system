    <text x="136" y="360" class="cardText">Internal users access</text>
    <text x="136" y="383" class="cardText">dashboard and workflow UI</text>

    <rect x="106" y="428" width="226" height="92" rx="22" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2.5"/>
    <text x="136" y="468" class="cardTitle">Vercel Edge / CDN</text>
    <text x="136" y="497" class="cardText">Hosts the Next.js app</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="550" y="280" width="360" height="106" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5"/>
    <text x="580" y="324" class="cardTitle">UI Layer</text>
    <text x="580" y="353" class="cardText">Dashboard, Portfolio, Warnings,</text>
    <text x="580" y="376" class="cardText">Watchlist, Stress, Audit, Clients</text>

    <rect x="550" y="424" width="360" height="106" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5"/>
    <text x="580" y="468" class="cardTitle">API Layer</text>
    <text x="580" y="497" class="cardText">Auth, clients, alerts, analytics,</text>
    <text x="580" y="520" class="cardText">monitoring, exports, notifications</text>

    <rect x="550" y="568" width="168" height="120" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5"/>
    <text x="580" y="610" class="cardTitle">Auth &amp; RBAC</text>
    <text x="580" y="639" class="cardText">JWT cookie auth</text>
    <text x="580" y="662" class="cardText">Role validation</text>

    <rect x="742" y="568" width="168" height="120" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5"/>
    <text x="772" y="610" class="cardTitle">Realtime</text>
    <text x="772" y="639" class="cardText">Polling</text>
    <text x="772" y="662" class="cardText">In-process event bus</text>

    <rect x="550" y="726" width="360" height="96" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5"/>
    <text x="580" y="768" class="cardTitle">Service Layer</text>
    <text x="580" y="797" class="cardText">Classification, monitoring, notifications,</text>
    <text x="580" y="820" class="cardText">committee, recovery, restructuring</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1160" y="292" width="214" height="156" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2.5"/>
    <text x="1190" y="334" class="cardTitle">SQL Server</text>
    <text x="1190" y="364" class="cardText">Core banking source tables</text>
    <text x="1190" y="387" class="cardText">Read-only to SPECTRA</text>
    <text x="1190" y="418" class="small">Customer, Credits, RiskPortfolio</text>

    <rect x="1160" y="502" width="214" height="220" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2.5"/>
    <text x="1190" y="544" class="cardTitle">Workflow Tables</text>
    <text x="1190" y="574" class="cardText">Operational state and audit evidence</text>
    <text x="1190" y="605" class="small">SystemActions</text>
    <text x="1190" y="628" class="small">Notifications</text>
    <text x="1190" y="651" class="small">ClientMonitoring</text>
    <text x="1190" y="674" class="small">DocumentRequests</text>
    <text x="1190" y="697" class="small">RecoveryCases / RestructuringPlans</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1550" y="286" width="240" height="84" rx="22" fill="#FFFBEB" stroke="#FCD34D" stroke-width="2.5"/>
    <text x="1580" y="336" class="cardTitle">feature_engineering.py</text>

    <rect x="1550" y="394" width="240" height="84" rx="22" fill="#FFFBEB" stroke="#FCD34D" stroke-width="2.5"/>
    <text x="1580" y="444" class="cardTitle">build_labels.py</text>

    <rect x="1550" y="502" width="240" height="84" rx="22" fill="#FFFBEB" stroke="#FCD34D" stroke-width="2.5"/>
    <text x="1580" y="552" class="cardTitle">train_model.py</text>

    <rect x="1550" y="610" width="240" height="96" rx="22" fill="#FFFBEB" stroke="#FCD34D" stroke-width="2.5"/>
    <text x="1580" y="652" class="cardTitle">predict.py + explain.py</text>
    <text x="1580" y="681" class="cardText">Generates scores and explanations</text>

    <rect x="1550" y="746" width="240" height="92" rx="22" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2.5"/>
    <text x="1580" y="786" class="cardTitle">Artifacts</text>
    <text x="1580" y="815" class="cardText">`data/processed/*.csv`,</text>
    <text x="1580" y="838" class="cardText">`models/*.pkl`, `training_meta.json`</text>
  </g>

