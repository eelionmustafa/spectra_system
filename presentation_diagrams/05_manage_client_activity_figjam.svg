<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow" x="0" y="0" width="1920" height="1080" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="5"/>
      <feGaussianBlur stdDeviation="8"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.0509804 0 0 0 0 0.105882 0 0 0 0 0.164706 0 0 0 0.12 0"/>
      <feBlend mode="normal" in2="SourceGraphic" result="shape"/>
    </filter>
    <marker id="arrowNavy" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#0D1B2A"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#D94040"/>
    </marker>
    <style>
      .title { font: 700 40px Inter, Arial, sans-serif; fill: #0D1B2A; }
      .sub { font: 400 22px Inter, Arial, sans-serif; fill: #64748B; }
      .zone { font: 700 18px Inter, Arial, sans-serif; fill: #0D1B2A; letter-spacing: .08em; }
      .cardTitle { font: 700 22px Inter, Arial, sans-serif; fill: #0D1B2A; }
      .cardText { font: 500 16px Inter, Arial, sans-serif; fill: #475569; }
      .decision { font: 700 18px Inter, Arial, sans-serif; fill: #0D1B2A; text-anchor: middle; dominant-baseline: middle; }
      .label { font: 700 15px Inter, Arial, sans-serif; fill: #0D1B2A; }
      .small { font: 600 14px Inter, Arial, sans-serif; fill: #64748B; }
      .footer { font: 500 16px Inter, Arial, sans-serif; fill: #64748B; }
      .lineNavy { stroke: #0D1B2A; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrowNavy); }
      .lineBlue { stroke: #2563EB; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrowBlue); }
      .lineRed { stroke: #D94040; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrowRed); }
      .divider { stroke: #CBD5E1; stroke-width: 3; stroke-dasharray: 12 10; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="#F8FAFC"/>

  <text x="72" y="82" class="title">SPECTRA Manage Client Activity</text>
  <text x="72" y="118" class="sub">FigJam-style flow for client search, profile loading, restricted-action checks, audit logging, and state refresh</text>

  <g>
    <rect x="70" y="166" width="420" height="44" rx="14" fill="#DBEAFE"/>
    <text x="280" y="194" class="zone" text-anchor="middle">USER / CLIENT LIST</text>

    <rect x="532" y="166" width="610" height="44" rx="14" fill="#E2E8F0"/>
    <text x="837" y="194" class="zone" text-anchor="middle">CLIENT PROFILE PAGE / UI</text>

    <rect x="1184" y="166" width="666" height="44" rx="14" fill="#DCFCE7"/>
    <text x="1517" y="194" class="zone" text-anchor="middle">AUTH + ACTION SERVICES</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="70" y="226" width="420" height="706" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"/>
    <rect x="532" y="226" width="610" height="706" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"/>
    <rect x="1184" y="226" width="666" height="706" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"/>
  </g>

  <line x1="490" y1="226" x2="490" y2="932" class="divider"/>
  <line x1="1142" y1="226" x2="1142" y2="932" class="divider"/>

  <g filter="url(#softShadow)">
    <circle cx="280" cy="286" r="32" fill="#E2E8F0" stroke="#0D1B2A" stroke-width="3"/>
    <text x="280" y="293" class="label" text-anchor="middle">Start</text>

    <rect x="136" y="348" width="288" height="92" rx="24" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2.5"/>
    <text x="166" y="390" class="cardTitle">Search for client</text>
    <text x="166" y="419" class="cardText">Name, ID, or account reference</text>

    <rect x="136" y="506" width="288" height="92" rx="24" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2.5"/>
    <text x="166" y="548" class="cardTitle">Review results</text>
    <text x="166" y="577" class="cardText">Candidate matches are shown</text>

    <path d="M280 640 L370 710 L280 780 L190 710 Z" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2.5"/>
    <text x="280" y="704" class="decision">Client</text>
    <text x="280" y="728" class="decision">selected?</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="694" y="268" width="286" height="108" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5"/>
    <text x="724" y="310" class="cardTitle">Load client profile</text>
    <text x="724" y="339" class="cardText">Fetch critical path profile and</text>
    <text x="724" y="362" class="cardText">resolve current user role</text>

    <rect x="694" y="442" width="286" height="124" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5"/>
    <text x="724" y="484" class="cardTitle">Display consolidated view</text>
    <text x="724" y="513" class="cardText">Overview, actions, documents,</text>
    <text x="724" y="536" class="cardText">engagements, restructuring,</text>
    <text x="724" y="559" class="cardText">recovery, and ML insights</text>

    <path d="M837 622 L927 692 L837 762 L747 692 Z" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2.5"/>
    <text x="837" y="686" class="decision">Restricted</text>
    <text x="837" y="710" class="decision">action?</text>

    <rect x="694" y="804" width="286" height="92" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2.5"/>
    <text x="724" y="846" class="cardTitle">Refresh client state</text>
    <text x="724" y="875" class="cardText">UI reflects latest workflow outcome</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1360" y="268" width="316" height="108" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2.5"/>
    <text x="1390" y="310" class="cardTitle">Profile and secondary queries</text>
    <text x="1390" y="339" class="cardText">Load DPD, EWI, products,</text>
    <text x="1390" y="362" class="cardText">actions, restructuring, recovery</text>

    <rect x="1360" y="470" width="316" height="92" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2.5"/>
    <text x="1390" y="512" class="cardTitle">Check authorization</text>
    <text x="1390" y="541" class="cardText">Validate cookie and role permissions</text>

    <path d="M1518 610 L1608 680 L1518 750 L1428 680 Z" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2.5"/>
    <text x="1518" y="674" class="decision">Authorized?</text>

    <rect x="1248" y="808" width="280" height="92" rx="24" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2.5"/>
    <text x="1278" y="850" class="cardTitle">Reject action</text>
    <text x="1278" y="879" class="cardText">Return forbidden / unauthorized</text>

    <rect x="1560" y="808" width="246" height="108" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2.5"/>
    <text x="1590" y="850" class="cardTitle">Persist action</text>
    <text x="1590" y="879" class="cardText">Write action, audit entry,</text>
    <text x="1590" y="902" class="cardText">and notification if needed</text>
  </g>

  <g>
    <path d="M280 318 C280 334, 280 338, 280 348" class="lineBlue"/>
    <path d="M280 440 C280 462, 280 478, 280 506" class="lineBlue"/>
    <path d="M280 598 C280 616, 280 624, 280 640" class="lineBlue"/>

    <path d="M370 710 C476 710, 560 710, 694 322" class="lineBlue"/>
    <text x="500" y="690" class="label">Yes</text>

    <path d="M280 780 C280 944, 280 944, 280 968" class="lineRed"/>
    <text x="312" y="798" class="label">No</text>

    <path d="M837 376 C837 404, 837 416, 837 442" class="lineNavy"/>
    <path d="M837 566 C837 586, 837 598, 837 622" class="lineNavy"/>

    <path d="M927 692 C1122 692, 1230 692, 1428 680" class="lineNavy"/>
    <text x="1160" y="674" class="label">Yes</text>

    <path d="M837 762 C837 944, 280 944, 280 968" class="lineBlue"/>
    <text x="720" y="780" class="label">No action</text>

    <path d="M1518 562 C1518 584, 1518 594, 1518 610" class="lineNavy"/>
    <path d="M1428 680 C1332 680, 1274 680, 1248 834" class="lineRed"/>
    <text x="1322" y="662" class="label">No</text>

    <path d="M1608 680 C1660 680, 1680 744, 1680 808" class="lineBlue"/>
    <text x="1652" y="662" class="label">Yes</text>

    <path d="M1680 916 C1680 944, 837 944, 837 896" class="lineBlue"/>
    <path d="M1388 900 C1388 944, 280 944, 280 968" class="lineRed"/>

    <path d="M837 896 C837 944, 280 944, 280 968" class="lineBlue"/>
  </g>

  <g filter="url(#softShadow)">
    <circle cx="280" cy="1000" r="32" fill="#E2E8F0" stroke="#0D1B2A" stroke-width="3"/>
    <text x="280" y="1007" class="label" text-anchor="middle">End</text>
  </g>

  <g>
    <rect x="1460" y="62" width="366" height="66" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="1488" y="90" class="small">Implementation notes</text>
    <text x="1488" y="114" class="small">- Profile loads first, secondary data fills in under `Suspense`</text>
  </g>

  <g>
    <rect x="1428" y="944" width="398" height="76" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="1456" y="972" class="small">Restricted action examples</text>
    <text x="1456" y="996" class="small">- freeze, escalate, recovery, restructuring approval</text>
    <text x="1456" y="1020" class="small">- audit evidence is written when actions succeed</text>
  </g>

  <text x="72" y="1036" class="footer">Import into FigJam as SVG. This version keeps the client workflow understandable on slides: search, select, load full profile, gate restricted actions by role, persist the action, then refresh the visible state.</text>
</svg>
