<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow" x="0" y="0" width="1920" height="1080" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="5"/>
      <feGaussianBlur stdDeviation="8"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.0509804 0 0 0 0 0.105882 0 0 0 0 0.164706 0 0 0 0.12 0"/>
      <feBlend mode="normal" in2="SourceGraphic" result="shape"/>
    </filter>
    <marker id="arrowNavy" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#0D1B2A"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#D94040"/>
    </marker>
    <style>
      .title { font: 700 40px Inter, Arial, sans-serif; fill: #0D1B2A; }
      .sub { font: 400 22px Inter, Arial, sans-serif; fill: #64748B; }
      .zone { font: 700 18px Inter, Arial, sans-serif; fill: #0D1B2A; letter-spacing: .08em; }
      .cardTitle { font: 700 22px Inter, Arial, sans-serif; fill: #0D1B2A; }
      .cardText { font: 500 16px Inter, Arial, sans-serif; fill: #475569; }
      .decision { font: 700 18px Inter, Arial, sans-serif; fill: #0D1B2A; text-anchor: middle; dominant-baseline: middle; }
      .label { font: 700 15px Inter, Arial, sans-serif; fill: #0D1B2A; }
      .small { font: 600 14px Inter, Arial, sans-serif; fill: #64748B; }
      .footer { font: 500 16px Inter, Arial, sans-serif; fill: #64748B; }
      .lineNavy { stroke: #0D1B2A; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrowNavy); }
      .lineBlue { stroke: #2563EB; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrowBlue); }
      .lineRed { stroke: #D94040; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrowRed); }
      .divider { stroke: #CBD5E1; stroke-width: 3; stroke-dasharray: 12 10; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="#F8FAFC"/>

  <text x="72" y="82" class="title">SPECTRA Dashboard View Activity</text>
  <text x="72" y="118" class="sub">FigJam-style activity flow for session validation, dashboard data loading, error handling, and live summary rendering</text>

  <g>
    <rect x="96" y="166" width="500" height="44" rx="14" fill="#DBEAFE"/>
    <text x="346" y="194" class="zone" text-anchor="middle">USER / BROWSER</text>

    <rect x="710" y="166" width="500" height="44" rx="14" fill="#E2E8F0"/>
    <text x="960" y="194" class="zone" text-anchor="middle">NEXT.JS PAGE / APP SHELL</text>

    <rect x="1324" y="166" width="500" height="44" rx="14" fill="#DCFCE7"/>
    <text x="1574" y="194" class="zone" text-anchor="middle">SESSION + DATA SERVICES</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="96" y="226" width="500" height="706" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"/>
    <rect x="710" y="226" width="500" height="706" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"/>
    <rect x="1324" y="226" width="500" height="706" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"/>
  </g>

  <line x1="596" y1="226" x2="596" y2="932" class="divider"/>
  <line x1="1210" y1="226" x2="1210" y2="932" class="divider"/>

  <g filter="url(#softShadow)">
    <circle cx="346" cy="286" r="32" fill="#E2E8F0" stroke="#0D1B2A" stroke-width="3"/>
    <text x="346" y="293" class="label" text-anchor="middle">Start</text>

    <rect x="202" y="348" width="288" height="92" rx="24" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2.5"/>
    <text x="232" y="390" class="cardTitle">Navigate to dashboard</text>
    <text x="232" y="419" class="cardText">Browser requests home page</text>

    <rect x="202" y="778" width="288" height="108" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2.5"/>
    <text x="232" y="820" class="cardTitle">See live dashboard</text>
    <text x="232" y="849" class="cardText">KPI cards, stage mix, alerts,</text>
    <text x="232" y="872" class="cardText">trends, and transactions render</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="816" y="268" width="288" height="92" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5"/>
    <text x="846" y="310" class="cardTitle">Validate session</text>
    <text x="846" y="339" class="cardText">Protected route checks access</text>

    <path d="M960 404 L1050 474 L960 544 L870 474 Z" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2.5"/>
    <text x="960" y="468" class="decision">Session</text>
    <text x="960" y="492" class="decision">valid?</text>

    <rect x="816" y="586" width="288" height="108" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5"/>
    <text x="846" y="628" class="cardTitle">Load summary data</text>
    <text x="846" y="657" class="cardText">Prepare KPI, stage, and risk</text>
    <text x="846" y="680" class="cardText">overview sections</text>

    <path d="M960 738 L1050 808 L960 878 L870 808 Z" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2.5"/>
    <text x="960" y="802" class="decision">Data</text>
    <text x="960" y="826" class="decision">available?</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1394" y="268" width="360" height="92" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2.5"/>
    <text x="1424" y="310" class="cardTitle">Session service</text>
    <text x="1424" y="339" class="cardText">Validate cookie and auth context</text>

    <rect x="1394" y="430" width="360" height="108" rx="24" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2.5"/>
    <text x="1424" y="472" class="cardTitle">Redirect to login</text>
    <text x="1424" y="501" class="cardText">Unauthenticated users are sent</text>
    <text x="1424" y="524" class="cardText">back to the login entry point</text>

    <rect x="1394" y="586" width="360" height="124" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2.5"/>
    <text x="1424" y="628" class="cardTitle">Query dashboard sources</text>
    <text x="1424" y="657" class="cardText">`getDashboardKPIs()`</text>
    <text x="1424" y="680" class="cardText">`getStageDistribution()`</text>
    <text x="1424" y="703" class="cardText">`getHighestRiskClient()`</text>

    <rect x="1394" y="760" width="360" height="126" rx="24" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2.5"/>
    <text x="1424" y="802" class="cardTitle">Operational error state</text>
    <text x="1424" y="831" class="cardText">If queries fail, show database</text>
    <text x="1424" y="854" class="cardText">connection / unavailable message</text>
  </g>

  <g>
    <path d="M346 318 C346 332, 346 338, 346 348" class="lineBlue"/>
    <path d="M490 394 C620 394, 690 394, 816 314" class="lineBlue"/>

    <path d="M960 360 C960 378, 960 388, 960 404" class="lineNavy"/>
    <path d="M1050 474 C1174 474, 1270 474, 1394 484" class="lineRed"/>
    <text x="1186" y="458" class="label">No</text>

    <path d="M960 544 C960 562, 960 570, 960 586" class="lineNavy"/>
    <text x="990" y="566" class="label">Yes</text>

    <path d="M1104 640 C1228 640, 1288 640, 1394 648" class="lineNavy"/>
    <path d="M960 694 C960 714, 960 722, 960 738" class="lineNavy"/>

    <path d="M1050 808 C1178 808, 1298 808, 1394 823" class="lineRed"/>
    <text x="1192" y="792" class="label">No</text>

    <path d="M870 808 C750 808, 650 808, 490 832" class="lineBlue"/>
    <text x="750" y="792" class="label">Yes</text>

    <path d="M1754 823 C1790 823, 1790 944, 346 944 C238 944, 238 906, 238 886" class="lineBlue"/>
    <path d="M1574 538 C1574 944, 346 944, 346 968" class="lineRed"/>
    <path d="M1574 886 C1574 944, 346 944, 346 968" class="lineRed"/>
  </g>

  <g filter="url(#softShadow)">
    <circle cx="346" cy="1000" r="32" fill="#E2E8F0" stroke="#0D1B2A" stroke-width="3"/>
    <text x="346" y="1007" class="label" text-anchor="middle">End</text>
  </g>

  <g>
    <rect x="1466" y="62" width="362" height="66" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="1494" y="90" class="small">Implementation notes</text>
    <text x="1494" y="114" class="small">- Top-level page loads KPI/stage summary before deferred sections</text>
  </g>

  <g>
    <rect x="1450" y="944" width="378" height="76" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="1478" y="972" class="small">Rendered dashboard includes</text>
    <text x="1478" y="996" class="small">- KPI banner and stage composition</text>
    <text x="1478" y="1020" class="small">- trends / transactions can stream or degrade gracefully</text>
  </g>

  <text x="72" y="1036" class="footer">Import into FigJam as SVG. This activity view keeps the real logic readable for slides: authenticate access, load core portfolio data, show errors clearly, or render the live dashboard summary.</text>
</svg>
